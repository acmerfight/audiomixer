name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Build (debug + tests)
        run: swift build

      - name: Run integration tests
        run: .build/debug/AudioRecorderIntegration
